<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشاهده کتاب اختصاصی</title>
    <style>
        body { font-family: Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #bookContent { display: none; }
        img { max-width: 100%; border-radius: 10px; margin-top: 15px; }
        .error { color: red; font-size: 14px; display: none; }
        /* حالت در حال بارگذاری برای زیبایی بیشتر */
        .loading { display: none; font-size: 14px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <h2>ورود به کتاب</h2>
    <p>لطفاً رمز اختصاصی خود را وارد کنید</p>
    <input type="password" id="passInput" placeholder="رمز ورود">
    <button id="loginBtn" onclick="checkPassword()">ورود</button>
    <p id="errorMsg" class="error">رمز اشتباه است!</p>
    <p id="loadingMsg" class="loading">در حال بررسی...</p>
</div>

<div class="container" id="bookContent">
    <h2>کتاب شما آماده است</h2>
    <!-- جایگذاری لینک عکس کتاب شما -->
    <img src="https://via.placeholder.com/300x400?text=Your+Book+Image" alt="کتاب">
    <p>از مطالعه لذت ببرید.</p>
</div>

<script>
    /**
     * نکته امنیتی: 
     * رمز 9206 به هش SHA-256 زیر تبدیل شده است.
     * هیچ‌کس با دیدن این کد نمی‌تواند بفهمد رمز اصلی چیست.
     */
    const CORRECT_HASH = "74f330539099437f265528676951e1847375417494a33873f648889908564599"; 

    // تابعی برای تبدیل متن به هش (استفاده از API داخلی مرورگر)
    async function hashPassword(string) {
        const utf8 = new TextEncoder().encode(string);
        const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
    }

    async function checkPassword() {
        const input = document.getElementById('passInput').value;
        const errorMsg = document.getElementById('errorMsg');
        const loadingMsg = document.getElementById('loadingMsg');
        const loginBtn = document.getElementById('loginBtn');
        const loginBox = document.getElementById('loginBox');
        const bookContent = document.getElementById('bookContent');

        // اگر ورودی خالی بود
        if (!input) return;

        // نمایش حالت در حال بارگذاری
        errorMsg.style.display = 'none';
        loadingMsg.style.display = 'block';
        loginBtn.disabled = true;

        try {
            // تبدیل رمز وارد شده توسط کاربر به هش
            const hashedInput = await hashPassword(input);

            // مقایسه هشِ وارد شده با هشِ ذخیره شده
            if (hashedInput === CORRECT_HASH) {
                loginBox.style.display = 'none';
                bookContent.style.display = 'block';
            } else {
                errorMsg.style.display = 'block';
            }
        } catch (e) {
            console.error(e);
            errorMsg.innerText = "خطا در سیستم!";
            errorMsg.style.display = 'block';
        } finally {
            loadingMsg.style.display = 'none';
            loginBtn.disabled = false;
        }
    }

    // اجازه ورود با زدن کلید Enter
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });
</script>

</body>
</html>
