<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>مدیریت هوشمند وجوه</title>
  <style>
    /* استایل‌های قبلی حفظ شده و بخش‌های جدید اضافه شده */
    body { font-family: Tahoma, Arial, sans-serif; background: #f8fafc; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .card { background: #16a34a; color: white; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; font-weight: bold; }
    .card:hover { background: #15803d; }
    
    /* بخش جدید: جمع‌بندی شاخص */
    .highlight-panel { 
        background: #ffffff; border-radius: 16px; padding: 20px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-right: 8px solid #16a34a;
        margin-bottom: 20px;
    }
    .big-stats { display: flex; justify-content: space-around; text-align: center; }
    .stat-box { display: flex; flex-direction: column; }
    .stat-value { font-size: 22px; font-weight: 800; color: #166534; margin-top: 5px; }
    .stat-label { font-size: 14px; color: #64748b; }

    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>

<div class="container">
    <h1>مدیریت وجوه</h1>
    <div class="cards" id="cards"></div>

    <!-- این بخش جدید است که سریع دیده می‌شود -->
    <div id="highlightPanel" class="highlight-panel">
        <h3 id="selectedTitle" style="margin-top:0">جزئیات</h3>
        <div class="big-stats">
            <div class="stat-box"><span class="stat-label">نقد</span><span class="stat-value" id="totalCash">-</span></div>
            <div class="stat-box"><span class="stat-label">بانک</span><span class="stat-value" id="totalBank">-</span></div>
            <div class="stat-box"><span class="stat-label">جمع کل</span><span class="stat-value" style="color:#059669" id="totalAll">-</span></div>
        </div>
    </div>

    <div class="details-grid" id="details"></div>
</div>

<script>
    const data = {
        "فقیر": { cash: {500:0, 1000:0, 2000:0, 5000:0, 10000:12, 50000:2, 100000:1}, bank: 350000 },
        "یتیم": { cash: {500:5, 1000:10, 2000:3, 5000:2, 10000:0, 50000:0, 100000:0}, bank: 1200000 }
    };

    function renderCards() {
        const cardsEl = document.getElementById("cards");
        Object.keys(data).forEach(key => {
            const card = document.createElement("div");
            card.className = "card";
            card.textContent = key;
            card.onclick = () => updateDisplay(key);
            cardsEl.appendChild(card);
        });
    }

    function updateDisplay(name) {
        const item = data[name];
        const cashTotal = Object.entries(item.cash).reduce((sum, [k, v]) => sum + (k * v), 0);
        const bankTotal = item.bank;
        
        // آپدیت سریع‌بین‌ها
        document.getElementById("selectedTitle").textContent = name;
        document.getElementById("totalCash").textContent = cashTotal.toLocaleString("fa-IR") + " ت";
        document.getElementById("totalBank").textContent = bankTotal.toLocaleString("fa-IR") + " ت";
        document.getElementById("totalAll").textContent = (cashTotal + bankTotal).toLocaleString("fa-IR") + " ت";
    }

    renderCards();
</script>
</body>
</html>
