<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدیریت مالی جامع</title>
  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
      color: #111827;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      color: #166534;
      margin-bottom: 24px;
      font-size: 30px;
      font-weight: 800;
    }

    /* استایل کارت‌ها */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      color: white;
      padding: 18px 16px;
      border-radius: 18px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: 0.25s ease;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      user-select: none;
    }

    /* کارت مخصوص "کل" با رنگ متمایز */
    .card.special-total {
      background: linear-gradient(145deg, #1e293b, #0f172a); /* رنگ تیره برای متمایز شدن */
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.3);
    }

    .card.normal-topic {
      background: linear-gradient(145deg, #22c55e, #16a34a);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .card.active {
      outline: 4px solid #86efac;
      outline-offset: 2px;
    }

    /* پنل خلاصه بالا */
    .top-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .summary-box {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      border: 1px solid #dcfce7;
      text-align: center;
    }

    .summary-label {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 900;
      color: #166534;
    }

    .summary-value.total {
      color: #059669;
      font-size: 32px;
    }

    /* پنل جزئیات */
    .panel {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      border: 1px solid #dcfce7;
    }

    .panel h2 {
      margin-top: 0;
      color: #166534;
      margin-bottom: 18px;
    }

    .money-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .money-item {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
    }

    /* استایل ردیف مجموع کل اسکناس‌ها در پایین */
    .money-item.grand-total-row {
      background: #dcfce7;
      border: 2px solid #16a34a;
      font-weight: bold;
      color: #166534;
      grid-column: 1 / -1; /* تمام عرض را بگیرد */
    }

    .sub-box {
      margin-top: 18px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
    }

    .sub-box-title {
      font-weight: bold;
      color: #166534;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 30px 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>مدیریت مالی جامع</h1>

    <!-- بخش کارت‌ها -->
    <div class="cards" id="cards"></div>

    <!-- بخش خلاصه اعداد بالا -->
    <div class="top-summary">
      <div class="summary-box">
        <div class="summary-label">جمع کل پول نقد</div>
        <div class="summary-value" id="cashTotalTop">-</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">جمع کل پول بانکی</div>
        <div class="summary-value" id="bankTotalTop">-</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">جمع کل پول</div>
        <div class="summary-value total" id="allTotalTop">-</div>
      </div>
    </div>

    <!-- بخش جزئیات -->
