<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدیریت پول موضوعات مختلف</title>
  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
      color: #111827;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      color: #166534;
      margin-bottom: 24px;
      font-size: 30px;
      font-weight: 800;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: linear-gradient(145deg, #22c55e, #16a34a);
      color: white;
      padding: 18px 16px;
      border-radius: 18px;
      box-shadow: 0 8px 18px rgba(22, 163, 74, 0.25);
      cursor: pointer;
      transition: 0.25s ease;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      user-select: none;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(22, 163, 74, 0.35);
    }

    .card.active {
      outline: 4px solid #86efac;
    }

    .top-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .summary-box {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      border: 1px solid #dcfce7;
      text-align: center;
    }

    .summary-label {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 900;
      color: #166534;
    }

    .summary-value.total {
      color: #059669;
      font-size: 32px;
    }

    .panel {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      border: 1px solid #dcfce7;
    }

    .panel h2 {
      margin-top: 0;
      color: #166534;
      margin-bottom: 18px;
    }

    .money-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .money-item {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
    }

    .money-item span:last-child {
      font-weight: bold;
      color: #14532d;
    }

    .sub-box {
      margin-top: 18px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
    }

    .sub-box-title {
      font-weight: bold;
      color: #166534;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 30px 10px;
    }

    @media (max-width: 600px) {
      .summary-value {
        font-size: 24px;
      }
      .summary-value.total {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>مدیریت پول موضوعات مختلف</h1>

    <div class="cards" id="cards"></div>

    <div class="top-summary">
      <div class="summary-box">
        <div class="summary-label">جمع کل پول نقد</div>
        <div class="summary-value" id="cashTotalTop">-</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">جمع کل پول بانکی</div>
        <div class="summary-value" id="bankTotalTop">-</div>
      </div>
      <div class="summary-box">
        <div class="summary-label">جمع کل پول</div>
        <div class="summary-value total" id="allTotalTop">-</div>
      </div>
    </div>

    <div class="panel">
      <h2 id="selectedTitle">جزئیات</h2>
      <div id="details" class="empty">روی یکی از باکس‌ها کلیک کن تا مشخصات و تعداد اسکناس‌ها نمایش داده شود.</div>
    </div>
  </div>

  <script>
    const denominations = [500, 1000, 2000, 5000, 10000, 50000, 100000, 200000, 500000, 1000000];

    const data = {
      "فقیر": {
        cash: {500:0, 1000:0, 2000:0, 5000:0, 10000:12, 50000:2, 100000:1, 200000:0, 500000:0, 1000000:0},
        bank: 350000
      },
      "یتیم": {
        cash: {500:5, 1000:10, 2000:3, 5000:2, 10000:0, 50000:0, 100000:0, 200000:1, 500000:0, 1000000:0},
        bank: 1200000
      },
      "مسجد": {
        cash: {500:0, 1000:0, 2000:0, 5000:4, 10000:6, 50000:3, 100000:2, 200000:0, 500000:1, 1000000:0},
        bank: 5000000
      },
      "جلسه": {
        cash: {500:20, 1000:10, 2000:5, 5000:1, 10000:0, 50000:0, 100000:0, 200000:0, 500000:0, 1000000:0},
        bank: 750000
      }
    };

    const cardsEl = document.getElementById("cards");
    const detailsEl = document.getElementById("details");
    const selectedTitleEl = document.getElementById("selectedTitle");

    function formatMoney(num) {
      return Number(num).toLocaleString("fa-IR") + " تومان";
    }

    function calculateCashTotal(cashObj) {
      return denominations.reduce((sum, denom) => {
        return sum + (denom * Number(cashObj[denom] || 0));
      }, 0);
    }

    function renderCards() {
      cardsEl.innerHTML = "";
      Object.keys(data).forEach((key, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = key;
        card.addEventListener("click", () => {
          document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
          card.classList.add("active");
          renderDetails(key);
        });
        cardsEl.appendChild(card);

        if (index === 0) setTimeout(() => card.click(), 0);
      });
    }

    function renderDetails(name) {
      const item = data[name];
      const cashTotal = calculateCashTotal(item.cash);
      const bankTotal = Number(item.bank || 0);
      const total = cashTotal + bankTotal;

      selectedTitleEl.textContent = `مشخصات: ${name}`;

      document.getElementById("cashTotalTop").textContent = formatMoney(cashTotal);
      document.getElementById("bankTotalTop").textContent = formatMoney(bankTotal);
      document.getElementById("allTotalTop").textContent = formatMoney(total);

      const cashItemsHtml = denominations.map(denom => {
        const count = Number(item.cash[denom] || 0);
        return `
          <div class="money-item">
            <span>${formatMoney(denom)}</span>
            <span>${count} عدد</span>
          </div>
        `;
      }).join("");

      detailsEl.className = "";
      detailsEl.innerHTML = `
        <div class="sub-box">
          <div class="sub-box-title">تعداد اسکناس‌ها</div>
          <div class="money-list">
            ${cashItemsHtml}
          </div>
        </div>

        <div class="sub-box">
          <div class="sub-box-title">اطلاعات بانکی</div>
          <div class="money-item">
            <span>موجودی بانک</span>
            <span>${formatMoney(bankTotal)}</span>
          </div>
        </div>
      `;
    }

    renderCards();
  </script>
</body>
</html>
